<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fintech - Metas Financeiras</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">

</head>

<body class="bg-gray-100">
    
     <div class="flex flex-col md:flex-row min-h-screen">

        <!-- Menu lateral -->
        <aside class="w-full md:w-64 bg-gradient-to-b from-blue-700 to-blue-500 text-white p-6">

            <h1 class="text-2xl font-bold mb-8">
                Fintech
            </h1>

            <ul class="space-y-4">

                <li>
                    <a href="#" class="block hover:bg-blue-700 p-2 rounded">
                        Dashboard
                    </a>
                </li>

                <li>
                    <a href="#" class="block hover:bg-blue-700 p-2 rounded">
                        Despesas
                    </a>
                </li>

                <li>
                    <a href="#" class="block hover:bg-blue-700 p-2 rounded">
                        Limites
                    </a>
                </li>

                <li>
                    <a href="#" class="block bg-blue-800 p-2 rounded">
                        Metas
                    </a>
                </li>

            </ul>

        </aside>

        <!-- Conteúdo -->
        <main class="flex-1 p-6 md:p-10">

            <h2 class="text-4xl font-bold">
                Metas Financeiras
            </h2>

            <div class="mt-10 space-y-8">

    <!-- Meta 1 -->
    <div class="bg-white p-6 rounded-lg shadow w-full max-w-3xl">

        <div class="flex justify-between mb-2">
            <h3 class="font-semibold text-lg">
                Viagem
            </h3>

            <span class="font-bold text-blue-600">
                25%
            </span>
        </div>

        <p class="mb-3 text-gray-600">
            R$ 1.250,00 / R$ 5.000,00
        </p>

        <div class="w-full bg-gray-300 rounded-full h-4">
            <div class="bg-blue-600 h-4 rounded-full w-1/4"></div>
        </div>

    </div>

    <!-- Meta 2 -->
    <div class="bg-white p-6 rounded-lg shadow w-full max-w-3xl">

        <div class="flex justify-between mb-2">
            <h3 class="font-semibold text-lg">
                Reserva de Emergência
            </h3>

            <span class="font-bold text-blue-600">
                30%
            </span>
        </div>

        <p class="mb-3 text-gray-600">
            R$ 3.000,00 / R$ 10.000,00
        </p>

        <div class="w-full bg-gray-300 rounded-full h-4">
            <div class="bg-blue-600 h-4 rounded-full" style="width:30%"></div>
        </div>

    </div>

    <!-- Meta 3 -->
    <div class="bg-white p-6 rounded-lg shadow w-full max-w-3xl">

        <div class="flex justify-between mb-2">
            <h3 class="font-semibold text-lg">
                Notebook Novo
            </h3>

            <span class="font-bold text-blue-600">
                50%
            </span>
        </div>

        <p class="mb-3 text-gray-600">
            R$ 2.500,00 / R$ 5.000,00
        </p>

        <div class="w-full bg-gray-300 rounded-full h-4">
            <div class="bg-blue-600 h-4 rounded-full w-1/2"></div>
        </div>

    </div>

    </div>
            <div class="mt-8">

        <button
         class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-3 rounded-lg shadow">
         Adicionar Meta
        </button>

    </div>
        </main>

    </div>

</body>

</html>
